name: Generate Social Preview (OG Image)

on:
  push:
    branches: [main]
    paths:
      - '.github/social-preview.config.json'
      - '.github/workflows/generate-social-preview.yml'
      - 'src/**'
      - 'package.json'
      - 'README.md'
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup OG Generator
        run: |
          mkdir -p .og-gen
          curl -sL https://raw.githubusercontent.com/rafaumeu/social-preview-generator/main/scripts/generate-og-gh.mjs -o .og-gen/gen.mjs
          cd .og-gen
          npm init -y --silent 2>/dev/null
          npm install @resvg/resvg-js@^2.6.0 --save --silent 2>/dev/null
          cd ..

      - name: Generate OG Image
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: node .og-gen/gen.mjs

      - name: Commit & Push
        run: |
          if git diff --quiet social-preview.png og-image.png 2>/dev/null; then
            echo "No changes to social preview images"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add social-preview.png og-image.png
            git commit -m "chore: update social preview image [skip ci]" || true
            git push
          fi
